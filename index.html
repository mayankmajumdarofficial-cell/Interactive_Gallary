<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Photo Gallery</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <header>
        <h1>Interactive Photo Gallery</h1>
        <p>Search, filter, or create your own custom categories dynamically</p>
    </header>

    <section class="form-section">
        <h2>Add a New Photo</h2>
        <form id="photoForm" class="photo-form">
            <div class="form-group">
                <label for="photoTitle">Title</label>
                <input type="text" id="photoTitle" placeholder="e.g., Space Shuttle" required>
            </div>
            <div class="form-group">
                <label for="photoCategory">Category</label>
                <input type="text" id="photoCategory" placeholder="e.g., Space, Urban" required>
            </div>
            <div class="form-group">
                <label for="photoUrl">Image URL (Optional)</label>
                <input type="url" id="photoUrl" placeholder="https://example.com/image.jpg">
            </div>
            <button type="submit" class="submit-btn">Add Photo</button>
        </form>
    </section>

    <div class="controls">
        <input type="text" id="searchBar" class="search-bar" placeholder="Search images by title...">
        <div class="filter-buttons" id="filterContainer"></div>
    </div>

    <main class="gallery-grid" id="galleryGrid"></main>
</div>

<div class="lightbox" id="lightbox">
    <span class="lightbox-close" id="lightboxClose">&times;</span>
    <img src="" alt="Enlarged view" class="lightbox-content" id="lightboxImg">
</div>

<script src="script.js"></script>
</body>
</html>
